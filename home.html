<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Relatos Breves</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Arial, Helvetica, sans-serif;
    background:white;
    color:#222;

}

header{

    text-align:center;
    padding:35px 20px 15px;

}

#back{

    margin-bottom:25px;

}

#back a{

    text-decoration:none;
    color:#777;
    font-size:15px;

}

#back a:hover{

    color:#000;

}

h1{

    font-size:42px;
    font-weight:normal;
    letter-spacing:3px;
    color:#666;

}

.subtitle{

    margin-top:8px;
    color:#999;
    font-size:15px;

}

#stories{

    max-width:1100px;

    margin:40px auto;

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(180px,220px));

    justify-content:center;

    gap:35px;

    padding:20px;

}

.story{

    text-decoration:none;
    color:inherit;

    transition:.25s;

}

.story:hover{

    transform:translateY(-6px);

}

.story img{

    width:100%;
    aspect-ratio:1/1;

    object-fit:cover;

    border:1px solid #ddd;

}

.story h2{

    margin-top:12px;

    text-align:center;

    font-size:18px;

    font-weight:normal;

    color:#777;

}

</style>

</head>

<body>

<header>

<div id="back">

<a href="index.html">← Portada</a>

</div>

<h1>RELATOS BREVES</h1>

<div class="subtitle">

Historias gráficas breves

</div>

</header>

<div id="stories"></div>

<script>

async function cargarHistorias(){

    const response = await fetch("stories/stories.json");
    const stories = await response.json();

    const container = document.getElementById("stories");

    for(const folder in stories){

        const story = stories[folder];

        const card = document.createElement("a");

        card.className = "story";

        card.href = "viewer.html?story=" + encodeURIComponent(folder);

        card.innerHTML = `
            <img src="stories/${folder}/${story.cover}" alt="${story.title}">
            <h2>${story.title.replace(/-/g," ")}</h2>
        `;

        container.appendChild(card);

    }

}

cargarHistorias();

</script>

</body>
</html>
