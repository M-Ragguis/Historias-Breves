<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Historias</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Arial, Helvetica, sans-serif;
    background:white;
    color:#222;

}

header{

    text-align:center;
    padding:60px 20px 30px;

}

header h1{

    font-size:42px;

    font-weight:normal;

    color:#666;

    letter-spacing:3px;

}

}

header p{

    color:#888;
    margin-top:10px;

}

#stories{

    max-width:1000px;
    margin:auto;

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(180px,220px));

    justify-content:center;

    gap:40px;

    padding:40px;

}

.story{

    text-decoration:none;
    color:inherit;

    transition:.25s;

}

.story:hover{

    transform:translateY(-6px);

}

.story img{

    width:100%;
    aspect-ratio:1/1;

    object-fit:cover;

    border:1px solid #ddd;

}

.story h2{

    font-size:18px;

    font-weight:normal;

    color:#777;

    text-align:center;

    margin-top:12px;

}

#backIndex{

    text-align:center;

    margin-bottom:40px;

}

#backIndex a{

    text-decoration:none;

    color:#777;

    font-size:15px;

}

#backIndex a:hover{

    color:#000;

}

</style>

</head>

<body>

<header>

<div id="backIndex">

<a href="index.html">← Portada</a>

</div>

<h1>RELATOS BREVES</h1>

<p>Historias gráficas breves</p>

</header>

<div id="stories"></div>

<script>

async function cargarHistorias(){

    const respuesta = await fetch("stories/stories.json");
    const historias = await respuesta.json();

    const contenedor = document.getElementById("stories");

    for(const carpeta in historias){

        const historia = historias[carpeta];

        const tarjeta = document.createElement("a");

        tarjeta.className="story";

        tarjeta.href="viewer.html?story="+encodeURIComponent(carpeta);

        tarjeta.innerHTML = `

<img src="stories/${carpeta}/${historia.cover}" alt="${historia.title}">

<h2>${historia.title.replaceAll("-", " ")}</h2>

`;
        `;¨º

        contenedor.appendChild(tarjeta);

    }

}

cargarHistorias();

</script>

</body>
</html>
