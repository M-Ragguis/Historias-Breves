<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Comic Viewer</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:white;
    font-family:Arial, Helvetica, sans-serif;

}

#viewer{

    min-height:100vh;

    display:flex;
    flex-direction:column;

    justify-content:center;
    align-items:center;

    padding:20px;

}

#counter{

    font-size:13px;
    color:#999;

    margin-bottom:15px;

}

/* -------- FILA PRINCIPAL -------- */

#main{

    display:flex;

    align-items:center;
    justify-content:center;

    gap:20px;

    width:100%;

}

.navSide{

    font-size:60px;

    color:rgba(0,0,0,.20);

    cursor:pointer;

    user-select:none;

    transition:.2s;

    flex-shrink:0;

}

.navSide:hover{

    color:rgba(0,0,0,.55);

}

img{

    max-width:92vw;
    max-height:82vh;

    object-fit:contain;

    cursor:pointer;

    user-select:none;

}

/* -------- FILA INFERIOR -------- */

#bottomNav{

    display:flex;

    justify-content:center;

    gap:80px;

    margin-top:20px;

}

.navBottom{

    font-size:34px;

    color:rgba(0,0,0,.35);

    cursor:pointer;

    transition:.2s;

    user-select:none;

}

.navBottom:hover{

    color:rgba(0,0,0,.7);

}

/* -------- CELULAR -------- */

@media (max-width:700px){

    #viewer{

        padding:10px;

    }

    #main{

        gap:10px;

    }

    .navSide{

        font-size:42px;

    }

    img{

        max-width:82vw;
        max-height:72vh;

    }

    #bottomNav{

        gap:45px;

        margin-top:15px;

    }

    .navBottom{

        font-size:28px;

    }

}

</style>

</head>

<body>

<div id="viewer">

<div id="counter"></div>

<div id="main">

<div id="left" class="navSide">❮</div>

<img id="page">

<div id="right" class="navSide">❯</div>

</div>

<div id="bottomNav">

<div id="first" class="navBottom">⏮</div>

<div id="last" class="navBottom">⏭</div>

</div>

</div>

<script>

const total = 18;

let current = 1;

const image = document.getElementById("page");
const counter = document.getElementById("counter");

function loadPage(){

    const number = String(current).padStart(3,"0");

    image.src = "stories/comic/" + number + ".jpg";

    counter.textContent = current + " / " + total;

}

function next(){

    if(current < total){

        current++;
        loadPage();

    }

}

function previous(){

    if(current > 1){

        current--;
        loadPage();

    }

}

function first(){

    current = 1;
    loadPage();

}

function last(){

    current = total;
    loadPage();

}

document.getElementById("left").addEventListener("click", previous);

document.getElementById("right").addEventListener("click", next);

document.getElementById("first").addEventListener("click", first);

document.getElementById("last").addEventListener("click", last);

image.addEventListener("click", next);

document.addEventListener("keydown", function(e){

    switch(e.key){

        case "ArrowLeft":
            previous();
            break;

        case "ArrowRight":
            next();
            break;

        case "Home":
            first();
            break;

        case "End":
            last();
            break;

    }

});

loadPage();

</script>

</body>

</html>
