<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comic Viewer</title>

<style>

body{
    margin:0;
    background:white;
    font-family:Arial,sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
}

h2{
    margin-top:25px;
    margin-bottom:10px;
    font-weight:normal;
}

#counter{
    margin-bottom:20px;
    color:#666;
}

img{
    max-width:90vw;
    max-height:75vh;
    object-fit:contain;
}

.controls{
    margin:25px;
    display:flex;
    gap:25px;
}

button{
    padding:12px 24px;
    font-size:16px;
    cursor:pointer;
    border:1px solid #ccc;
    background:white;
}

button:hover{
    background:#f2f2f2;
}

</style>
</head>

<body>

<h2>Mi Comic</h2>

<div id="counter"></div>

<img id="page">

<div class="controls">
<button onclick="prev()">◀ Anterior</button>
<button onclick="next()">Siguiente ▶</button>
</div>

<script>

const total=20;

let page=1;

const img=document.getElementById("page");
const counter=document.getElementById("counter");

function update(){

let number=String(page).padStart(3,"0");

img.src=`stories/comic/${number}.jpg`;

counter.innerHTML=`${page} / ${total}`;

}

function next(){

if(page<total){

page++;

update();

}

}

function prev(){

if(page>1){

page--;

update();

}

}

document.addEventListener("keydown",e=>{

if(e.key=="ArrowRight") next();

if(e.key=="ArrowLeft") prev();

});

update();

</script>

</body>
</html>
