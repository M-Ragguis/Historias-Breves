<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Comic Viewer</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#fff;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

#viewer{

    width:100vw;
    height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

}

#counter{

    font-size:13px;
    color:#999;

    margin-bottom:10px;

}

img{

    max-width:98vw;
    max-height:90vh;

    object-fit:contain;

    cursor:pointer;

    user-select:none;

}

/* ---------- BOTONES ---------- */

.nav{

    position:fixed;

    width:8vw;
    height:100vh;

    top:0;

    display:flex;

    justify-content:center;
    align-items:center;

    font-size:60px;

    color:rgba(0,0,0,.15);

    cursor:pointer;

    transition:.20s;

    user-select:none;

}

.nav:hover{

    color:rgba(0,0,0,.45);

}

#first{

    left:0;

}

#left{

    left:8vw;

}

#right{

    right:8vw;

}

#last{

    right:0;

}

/* ---------- MÓVIL ---------- */

@media (max-width:900px){

    img{

        max-width:96vw;
        max-height:78vh;

    }

    .nav{

        width:50vw;
        height:70px;

        font-size:42px;

        color:rgba(0,0,0,.35);

        background:white;

    }

    #first{

        top:0;
        left:0;

    }

    #left{

        top:0;
        left:50vw;

    }

    #right{

        top:calc(100vh - 70px);
        left:0;

    }

    #last{

        top:calc(100vh - 70px);
        left:50vw;

    }

}

</style>

</head>

<body>

<div id="viewer">

<div id="counter"></div>

<img id="page">

</div>

<div id="first" class="nav">⏮</div>

<div id="left" class="nav">❮</div>

<div id="right" class="nav">❯</div>

<div id="last" class="nav">⏭</div>

<script>

const total = 18;

let current = 1;

const image = document.getElementById("page");
const counter = document.getElementById("counter");

function loadPage(){

    const number = String(current).padStart(3,"0");

    image.src = "stories/comic/" + number + ".jpg";

    counter.textContent = current + " / " + total;

}

function next(){

    if(current < total){

        current++;
        loadPage();

    }

}

function previous(){

    if(current > 1){

        current--;
        loadPage();

    }

}

function first(){

    current = 1;
    loadPage();

}

function last(){

    current = total;
    loadPage();

}

document.getElementById("left").onclick = previous;
document.getElementById("right").onclick = next;
document.getElementById("first").onclick = first;
document.getElementById("last").onclick = last;

image.onclick = next;

document.addEventListener("keydown",(e)=>{

    switch(e.key){

        case "ArrowRight":
            next();
            break;

        case "ArrowLeft":
            previous();
            break;

        case "Home":
            first();
            break;

        case "End":
            last();
            break;

    }

});

loadPage();

</script>

</body>

</html>
