<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Comic Viewer</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:white;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

#viewer{
    width:100vw;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

#counter{
    font-size:13px;
    color:#999;
    margin-bottom:12px;
}

img{
    max-width:98vw;
    max-height:90vh;
    object-fit:contain;
    user-select:none;
    cursor:pointer;
}

.nav{
    position:fixed;
    top:0;
    width:8vw;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:60px;
    color:rgba(0,0,0,.15);
    cursor:pointer;
    user-select:none;
    transition:.2s;
}

.nav:hover{
    color:rgba(0,0,0,.45);
}

#first{
    left:0;
}

#left{
    left:8vw;
}

#right{
    right:8vw;
}

#last{
    right:0;
}

</style>

</head>

<body>

<div id="viewer">

<div id="counter"></div>

<img id="page">

</div>

<div id="first" class="nav">⏮</div>

<div id="left" class="nav">❮</div>

<div id="right" class="nav">❯</div>

<div id="last" class="nav">⏭</div>

<script>

const total = 18;

let current = 1;

const image = document.getElementById("page");
const counter = document.getElementById("counter");

function loadPage(){

    const number = String(current).padStart(3,"0");

    image.src = "stories/comic/" + number + ".jpg";

    counter.textContent = current + " / " + total;

}

function next(){

    if(current < total){

        current++;
        loadPage();

    }

}

function previous(){

    if(current > 1){

        current--;
        loadPage();

    }

}

function first(){

    current = 1;
    loadPage();

}

function last(){

    current = total;
    loadPage();

}

document.getElementById("left").onclick = previous;
document.getElementById("right").onclick = next;
document.getElementById("first").onclick = first;
document.getElementById("last").onclick = last;

image.onclick = next;

document.addEventListener("keydown",(e)=>{

    if(e.key==="ArrowRight") next();

    if(e.key==="ArrowLeft") previous();

    if(e.key==="Home") first();

    if(e.key==="End") last();

});

loadPage();

</script>

</body>

</html>
