<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marce.Raggui</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Arial, Helvetica, sans-serif;
    background:white;
    color:#222;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:30px;

}

#container{

    width:100%;
    max-width:1100px;

    display:flex;
    flex-direction:column;

    align-items:center;

}

#imageBox{

    position:relative;

    width:100%;
    max-width:950px;

}

#cover{

    width:100%;
    display:block;

}

#name{

    position:absolute;

    top:-52px;

    left:50%;

    transform:translateX(-50%);

    color:rgba(80,80,80,.65);

    font-size:26px;

    letter-spacing:.5px;

    font-weight:normal;

    white-space:nowrap;

}

#menu{

    margin-top:28px;

    display:flex;

    justify-content:center;

    align-items:center;

    gap:42px;

    flex-wrap:wrap;

}

#menu a,
#menu span{

    text-decoration:none;

    color:#777;

    font-size:17px;

    transition:all .2s ease;

}

#menu span{

    color:#999;

}

#menu a:hover{

    color:#333;

    transform:translateY(-2px);

}

#menu a:active{

    transform:translateY(1px) scale(.97);

}

@media(max-width:700px){

    body{

        padding:15px;

    }

    #imageBox{

        max-width:100%;

    }

    #name{

        top:-34px;

        font-size:18px;

        letter-spacing:.3px;

    }

    #menu{

        flex-direction:column;

        gap:14px;

    }

    #menu a,
    #menu span{

        font-size:16px;

    }

}

</style>

</head>

<body>

<div id="container">

<div id="imageBox">

<img id="cover" src="cover.jpg" alt="Portada">

<div id="name">

Marce.Raggui

</div>

</div>

<div id="menu">

<a href="home.html">Relatos breves</a>

<span>Portafolio (próximamente)</span>

</div>

</div>

</body>

</html>
