<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Comic Viewer</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:white;
    font-family:Arial, Helvetica, sans-serif;
    overflow:hidden;

}

#viewer{

    height:100dvh;

    display:grid;

    grid-template-rows:
        auto
        1fr
        auto
        auto;

    align-items:center;

    padding:8px;

}

#counter{

    text-align:center;

    font-size:13px;

    color:#999;

    padding-bottom:6px;

}

#main{

    display:grid;

    grid-template-columns:
        50px
        1fr
        50px;

    align-items:center;

}

.navSide{

    text-align:center;

    font-size:58px;

    color:rgba(0,0,0,.22);

    cursor:pointer;

    user-select:none;

    transition:.2s;

}

.navSide:hover{

    color:rgba(0,0,0,.55);

}

#page{

    max-width:100%;

    max-height:68dvh;

    margin:auto;

    object-fit:contain;

    cursor:pointer;

}

#bottomNav{

    display:flex;

    justify-content:center;

    gap:70px;

    padding:10px 0 4px;

}

.navBottom{

    font-size:32px;

    color:rgba(0,0,0,.35);

    cursor:pointer;

    transition:.2s;

}

.navBottom:hover{

    color:rgba(0,0,0,.7);

}

#backHome{

    text-align:center;

    padding-bottom:6px;

}

#backHome a{

    text-decoration:none;

    color:#777;

    font-size:14px;

}

#backHome a:hover{

    color:#000;

}

/* ---------- CELULAR ---------- */

@media (max-width:700px){

    #viewer{

        padding:6px;

    }

    #main{

        grid-template-columns:
            36px
            1fr
            36px;

    }

    .navSide{

        font-size:40px;

    }

    #page{

        max-height:60dvh;

    }

    #bottomNav{

        gap:34px;

        padding-top:6px;

    }

    .navBottom{

        font-size:26px;

    }

    #backHome{

        padding-bottom:4px;

    }

    #backHome a{

        font-size:13px;

    }

}

</style>

</head>

<body>

<div id="viewer">

<div id="counter"></div>

<div id="main">

<div id="left" class="navSide">❮</div>

<img id="page">

<div id="right" class="navSide">❯</div>

</div>

<div id="bottomNav">

<div id="first" class="navBottom">⏮</div>

<div id="last" class="navBottom">⏭</div>

</div>

<div id="backHome">

<a href="home.html">← Volver a Relatos</a>

</div>

</div>

<script src="viewer.js"></script>

</body>

</html>
