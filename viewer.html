<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Comic Viewer</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:white;
    font-family:Arial, Helvetica, sans-serif;

    overflow:hidden;

}

#viewer{

    height:100vh;

    display:flex;

    flex-direction:column;

    justify-content:space-between;

    align-items:center;

    padding:10px;

}

#counter{

    font-size:13px;
    color:#999;

    flex-shrink:0;

}

/* -------- FILA PRINCIPAL -------- */

#main{

    flex:1;

    width:100%;

    display:flex;

    align-items:center;

    justify-content:center;

    gap:20px;

    overflow:hidden;

}

.navSide{

    font-size:60px;

    color:rgba(0,0,0,.20);

    cursor:pointer;

    user-select:none;

    transition:.2s;

    flex-shrink:0;

}

.navSide:hover{

    color:rgba(0,0,0,.55);

}

#page{

    max-width:90vw;

    max-height:70vh;

    object-fit:contain;

    cursor:pointer;

    user-select:none;

}

/* -------- FILA INFERIOR -------- */

#bottomNav{

    display:flex;

    justify-content:center;

    gap:70px;

    margin-top:10px;

    flex-shrink:0;

}

.navBottom{

    font-size:34px;

    color:rgba(0,0,0,.35);

    cursor:pointer;

    transition:.2s;

    user-select:none;

}

.navBottom:hover{

    color:rgba(0,0,0,.7);

}

#backHome{

    margin:8px 0 6px;

    flex-shrink:0;

}

#backHome a{

    text-decoration:none;

    color:#777;

    font-size:15px;

}

#backHome a:hover{

    color:#000;

}

/* -------- CELULAR -------- */

@media (max-width:700px){

    #viewer{

        padding:8px;

    }

    #main{

        gap:10px;

    }

    .navSide{

        font-size:42px;

    }

    #page{

        max-width:82vw;

        max-height:62vh;

    }

    #bottomNav{

        gap:45px;

    }

    .navBottom{

        font-size:28px;

    }

    #backHome a{

        font-size:14px;

    }

}

</style>

</head>

<body>

<div id="viewer">

<div id="counter"></div>

<div id="main">

<div id="left" class="navSide">❮</div>

<img id="page">

<div id="right" class="navSide">❯</div>

</div>

<div id="bottomNav">

<div id="first" class="navBottom">⏮</div>

<div id="last" class="navBottom">⏭</div>

</div>

<div id="backHome">

<a href="home.html">← Volver a Relatos</a>

</div>

</div>

<script src="viewer.js"></script>

</body>

</html>
